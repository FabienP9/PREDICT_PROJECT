version: 2

sources:
  - name: LAND
    schema: LANDING
    tables:
      
      - name: GAMEDAY_MODIF
        description: The table display source gameday wich to be changed or grouped
        identifier: LANDING_GAMEDAY_MODIFICATION
        columns:

          - name: SEASON_ID
            description: The ID of the season
            tests:
              - is_foreign_key:
                  to_model: ref('curated_season')
                  to_column: SEASON_ID 

          - name: GAME_SOURCE_ID
            description: The id of the game on the source
            tests:
              - not_null

          - name: GAMEDAY_MODIFIED
            description: The gameday modified
            tests:
              - not_null